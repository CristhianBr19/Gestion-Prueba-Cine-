<div class="container mt-5 shadow-sm p-4 bg-white rounded border">

  <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">

    <h2 class="fw-bold text-secondary m-0">Gestión de Películas</h2>

    <div class="d-flex flex-wrap align-items-end gap-3">

      <div style="min-width: 200px;">
        <label class="form-label small fw-bold text-muted mb-1">Título:</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control border-start-0" placeholder="Buscar..." #busq (keyup)="search(busq)">
        </div>
      </div>

      <div style="min-width: 220px;">
        <label class="form-label small fw-bold text-muted mb-1">Fecha:</label>
        <div class="input-group">
          <input type="date" class="form-control" [(ngModel)]="fechaFiltro">
          <button class="btn btn-outline-secondary" (click)="aplicarFiltroFecha()">
            <i class="bi bi-filter"></i>
          </button>
        </div>
      </div>

      <button class="btn btn-primary d-flex align-items-center gap-2" (click)="openModal()" style="height: 38px;">
        <i class="bi bi-plus-circle"></i> Nuevo
      </button>

    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle border-top">
      <thead class="table-light">
        <tr>
          <th scope="col" class="py-3 text-muted">TÍTULO</th>
          <th scope="col" class="py-3 text-muted">DURACIÓN</th>
          <th scope="col" class="py-3 text-muted">ESTADO</th>
           <th scope="col" class="py-3 text-muted">FECHA</th>

          <th scope="col" class="py-3 text-muted text-end">ACCIONES</th>
        </tr>
      </thead>
      <tbody>
        @for (peli of peliculas() ; track $index) {
          <tr>
            <td class="fw-semibold text-dark">{{peli.nombre}}</td>
            <td>
              <span class="badge rounded-pill bg-light text-dark border">
                <i class="bi bi-clock me-1"></i> {{peli.duracion}} min
              </span>
            </td>
            <td>
              @if (peli.active) {
                <span class="badge bg-success-subtle text-success border border-success-subtle px-3">Activa</span>
              } @else {
                <span class="badge bg-danger-subtle text-danger border border-danger-subtle px-3">Inactiva</span>
              }
            </td>
            <td>{{peli.fecha_publicacion | date:'yyyy-MM-dd' }}</td>

            <td class="text-end">
              <button (click)="editModal(peli)" class="btn btn-sm btn-outline-primary me-2" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button (click)="desactivatePEli(peli)" class="btn btn-sm btn-outline-danger" title="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>

<!--Modal-->
  </div>
</div> <div class="modal fade" id="peliModal" tabindex="-1" #peliModalRef>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          {{editinId? 'Editar película':'Nueva Película'}}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form [formGroup]="formPeliculas">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" formControlName="nombre"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Duración (min)</label>
            <input type="number" class="form-control" formControlName="duracion">
          </div>

           <!-- RELEASE DATE -->

           <div class="mb-3">
            <label class="form-label">Fecha de Publicacion</label>
            <input type="date"
            formControlName="fecha_publicacion"
            [min]="minDate"
            [max]="maxDate"
            class="form-control">
           </div>

          <div class="form-check mb-3">
            <input
              class="form-check-input"
              type="checkbox"
              formControlName="active"
              id="checkActive"/>
            <label class="form-check-label" for="checkActive">Active</label>
          </div>
        </div>


        <div class="modal-footer">
          <button class="btn btn-secondary" type="button" (click)="modalRef.hide()">Cancelar</button>
          <button (click)="save()" class="btn btn-primary" type="button">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
